<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>价格档位 - 最新版 20260624</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f4f4f7;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1440px; margin: 0 auto; }
        header {
            background: #ee4d2d;
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        .desc-box {
            background: rgba(255,255,255,0.2);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
        }
        .filter-section {
            background: white;
            padding: 18px 20px;
            border-radius: 24px;
            margin-bottom: 28px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid #f0f0f0;
        }
        input, select {
            padding: 10px 14px;
            border: 1px solid #e2e2e2;
            border-radius: 30px;
            font-size: 13px;
            background: #fafafa;
            min-width: 130px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #f0f0f0;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .judge-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            z-index: 10;
            color: white;
        }
        .bg-high { background: #2b7a4b; }   /* 高价品 - 绿色 */
        .bg-medium { background: #d4880f; } /* 中价品 - 金色 */
        .bg-low { background: #1a5c7e; }    /* 低价品 - 蓝色 */
        .img-container {
            width: 100%;
            height: 200px;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-in;
            border-bottom: 1px solid #eee;
        }
        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .info { padding: 18px 16px; flex-grow: 1; }
        .title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            overflow: hidden;
        }
        .price-range {
            color: #ee4d2d;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .variants-box {
            background: #fafafa;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #efefef;
        }
        .variant-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 6px 8px;
            border-bottom: 1px dashed #eee;
        }
        .invite-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
        }
        .model-count-tag {
            background: #fff1f0;
            border: 1px solid #ffbcb3;
            color: #c02b1a;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 30px;
        }
        .invite-id-box {
            flex-grow: 1;
            background: #fff8f6;
            border: 2px dashed #ee4d2d;
            padding: 6px;
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            color: #ee4d2d;
            border-radius: 40px;
            cursor: pointer;
        }
        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #9c9cac;
            border-top: 1px solid #efefef;
            padding-top: 14px;
            margin-top: auto;
        }
        .footer-row a {
            color: #0066cc;
            font-weight: 600;
            text-decoration: none;
            font-size: 12px;
            background: #f0f7ff;
            padding: 4px 10px;
            border-radius: 40px;
            margin-left: 6px;
        }
        .expand-btn {
            background: none;
            border: 1px dashed #aaa;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            margin: 10px 0 5px;
        }
        .model-images {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .model-images.show { display: grid; }
        .model-img-item { text-align: center; }
        .model-img-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: zoom-in;
        }
        .model-img-item .model-price {
            font-size: 11px;
            color: #ee4d2d;
        }
        #imageModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #imageModal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }
        #pagination button {
            background: white;
            border: 1px solid #ddd;
            border-radius: 30px;
            padding: 6px 16px;
            cursor: pointer;
        }
        #countDisplay {
            background: #fff0ed;
            padding: 6px 16px;
            border-radius: 40px;
        }
        #debugBox {
            background: #fff8e1;
            border: 2px solid #d4880f;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        #debugBox .high { color: #2b7a4b; font-weight: 700; }
        #debugBox .medium { color: #d4880f; font-weight: 700; }
        #debugBox .low { color: #1a5c7e; font-weight: 700; }
        .version-tag {
            background: #fff;
            color: #ee4d2d;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🔥 价格档位版 <span class="version-tag">v3.0 - 2026-06-24</span></h1>
        <div class="desc-box">
            <p>💰 读取CSV的 <strong>K列(price judge)</strong> 和 <strong>O列(tag)</strong> 作为价格档位</p>
        </div>
    </header>

    <!-- 调试信息 -->
    <div id="debugBox">
        ⏳ 正在加载数据...
    </div>

    <div class="filter-section">
        <input type="text" id="searchInput" placeholder="🔍 搜索标题 / ID..." oninput="debouncedFilter()">
        <select id="l1Filter" onchange="updateL2(); updateL3(); applyFilters()"><option value="">一级类目(全部)</option></select>
        <select id="l2Filter" onchange="updateL3(); applyFilters()"><option value="">二级类目(全部)</option></select>
        <select id="l3Filter" onchange="applyFilters()"><option value="">三级类目(全部)</option></select>
        <!-- 价格档位筛选 - 三个选项 -->
        <select id="priceLevelFilter" onchange="applyFilters()" style="background:#fff8e1; border-color:#d4880f; font-weight:600;">
            <option value="">🏷️ 价格档位(全部)</option>
            <option value="高价品">🟢 高价品</option>
            <option value="中价品">🟡 中价品</option>
            <option value="低价品">🔵 低价品</option>
        </select>
        <select id="dateFilter" onchange="applyFilters()">
            <option value="">发布日期(全部)</option>
        </select>
        <input type="number" id="minPrice" placeholder="¥ 最低价" step="0.01" oninput="debouncedFilter()">
        <input type="number" id="maxPrice" placeholder="¥ 最高价" step="0.01" oninput="debouncedFilter()">
        <select id="sortOrder" onchange="applyFilters()">
            <option value="default">📌 默认排序</option>
            <option value="priceAsc">💹 价格升序</option>
            <option value="priceDesc">💹 价格降序</option>
        </select>
        <span id="countDisplay" style="font-weight:600; color:#ee4d2d; margin-left:auto;">加载中...</span>
    </div>

    <div class="product-grid" id="productGrid"></div>
    <div style="margin:30px 0 20px; text-align:center;" id="pagination"></div>
</div>

<div id="imageModal" onclick="this.style.display='none'"><img id="modalImg" src=""></div>

<script>
    // ============================================================
    // 版本: v3.0 - 2026-06-24
    // 功能: 从CSV的K列(price judge)和O列(tag)读取价格档位
    // ============================================================
    console.log('========== 价格档位版 v3.0 ==========');

    const L3_MAP = {
        '1': 'Socks',
        '2': 'Pantyhose',
        '3': 'Others',
    };

    let products = [];
    let groupedProducts = [];
    let filteredGroup = [];
    let currentPage = 1;
    const pageSize = 40;

    const cleanId = (str) => {
        if (!str) return "";
        return str.toString().replace(/^['"+]+|["=\t]/g, '').trim();
    };

    const safeGet = (arr, idx, defaultValue = '') => {
        if (arr && arr.length > idx && arr[idx] != null) {
            return String(arr[idx]);
        }
        return defaultValue;
    };

    const mapL3 = (val) => {
        if (!val) return '';
        const trimmed = val.trim();
        if (/^\d+$/.test(trimmed) && L3_MAP.hasOwnProperty(trimmed)) {
            return L3_MAP[trimmed];
        }
        return trimmed;
    };

    // 从K列和O列读取价格档位
    const getPriceLevel = (judgeText, tag) => {
        const judge = (judgeText || '').trim();
        const tagVal = (tag || '').trim();
        
        // 优先K列
        if (judge.includes('高价品')) return '高价品';
        if (judge.includes('中价品')) return '中价品';
        if (judge.includes('低价品')) return '低价品';
        
        // 其次O列
        if (tagVal.includes('高价品')) return '高价品';
        if (tagVal.includes('中价品')) return '中价品';
        if (tagVal.includes('低价品')) return '低价品';
        
        return '中价品';
    };

    const isValidRow = (arr) => {
        const title = safeGet(arr, 0).trim();
        if (!title) return false;
        return true;
    };

    const parseRow = (arr) => {
        const rawL3 = safeGet(arr, 16).trim();
        const judgeText = safeGet(arr, 10).trim();      // K列
        const tag = safeGet(arr, 14).trim();            // O列
        const priceLevel = getPriceLevel(judgeText, tag);
        
        return {
            title: safeGet(arr, 0),
            variant: safeGet(arr, 1),
            price: parseFloat(safeGet(arr, 2)) || 0,
            imgUrl: safeGet(arr, 3),
            link: safeGet(arr, 4),
            l1: safeGet(arr, 5).trim(),
            l2: safeGet(arr, 6).trim(),
            l3: mapL3(rawL3),
            l3raw: rawL3,
            inviteId: cleanId(safeGet(arr, 7)),
            modelId: cleanId(safeGet(arr, 8)),
            link1688: safeGet(arr, 9),
            judgeText: judgeText,
            date: safeGet(arr, 11).trim(),
            itemid: cleanId(safeGet(arr, 12)) || `temp_${Math.random()}`,
            maxPrice: parseFloat(safeGet(arr, 13)) || 0,
            tag: tag,
            modelCount: parseInt(safeGet(arr, 15), 10) || 1,
            priceLevel: priceLevel
        };
    };

    function groupByItemid(rows) {
        const groups = new Map();
        rows.forEach(row => {
            const parsed = parseRow(row);
            const id = parsed.itemid;
            if (!groups.has(id)) {
                groups.set(id, {
                    itemid: id,
                    title: parsed.title,
                    imgUrl: parsed.imgUrl,
                    link: parsed.link,
                    l1: parsed.l1,
                    l2: parsed.l2,
                    l3: parsed.l3,
                    l3raw: parsed.l3raw,
                    inviteId: parsed.inviteId,
                    link1688: parsed.link1688,
                    date: parsed.date,
                    priceLevel: parsed.priceLevel,
                    variants: [],
                });
            }
            const group = groups.get(id);
            if (!group.imgUrl && parsed.imgUrl) group.imgUrl = parsed.imgUrl;
            if (!group.link && parsed.link) group.link = parsed.link;
            if (!group.link1688 && parsed.link1688) group.link1688 = parsed.link1688;
            if (!group.l3 && parsed.l3) group.l3 = parsed.l3;
            if (parsed.priceLevel && parsed.priceLevel !== '中价品') {
                group.priceLevel = parsed.priceLevel;
            }
            group.variants.push({
                variant: parsed.variant,
                price: parsed.price,
                modelId: parsed.modelId,
                inviteId: parsed.inviteId,
                judgeText: parsed.judgeText,
                imgUrl: parsed.imgUrl,
                priceLevel: parsed.priceLevel,
            });
        });

        const result = [];
        for (let group of groups.values()) {
            const prices = group.variants.map(v => v.price).filter(p => p > 0);
            group.minPrice = prices.length ? Math.min(...prices) : 0;
            group.maxPrice = prices.length ? Math.max(...prices) : 0;
            group.modelCount = group.variants.length;
            
            // 确保价格档位正确
            let finalLevel = group.priceLevel;
            if (finalLevel === '中价品') {
                for (const v of group.variants) {
                    if (v.priceLevel && v.priceLevel !== '中价品') {
                        finalLevel = v.priceLevel;
                        break;
                    }
                }
            }
            group.priceLevel = finalLevel;
            group.variants.sort((a,b) => a.price - b.price);
            result.push(group);
        }
        return result;
    }

    async function loadData() {
        const debugBox = document.getElementById('debugBox');
        
        try {
            debugBox.innerHTML = '⏳ 正在读取 data - new.csv ...';
            
            const res = await fetch('data - new.csv');
            if (!res.ok) throw new Error(`HTTP错误: ${res.status}`);
            const text = await res.text();
            
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length < 2) throw new Error('CSV文件只有标题行');

            const rawRows = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                if (line.replace(/,/g, '').trim() === '') continue;
                
                let row = [], cur = '', inQuote = false;
                for (let c of line) {
                    if (c === '"') inQuote = !inQuote;
                    else if (c === ',' && !inQuote) {
                        row.push(cur.trim());
                        cur = '';
                    } else cur += c;
                }
                row.push(cur.trim());
                
                if (!isValidRow(row)) continue;
                rawRows.push(row);
            }

            if (rawRows.length === 0) throw new Error('没有有效数据行');

            products = rawRows;
            groupedProducts = groupByItemid(products);
            
            // 统计价格档位分布
            const levelCount = { '高价品': 0, '中价品': 0, '低价品': 0 };
            groupedProducts.forEach(g => {
                const lv = g.priceLevel || '中价品';
                if (levelCount.hasOwnProperty(lv)) levelCount[lv]++;
            });
            
            // 显示调试信息
            debugBox.innerHTML = `
                <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
                    <span style="font-weight:700;">✅ 数据加载成功</span>
                    <span>📊 总商品: <strong>${groupedProducts.length}</strong></span>
                    <span class="high">🟢 高价品: <strong>${levelCount['高价品'] || 0}</strong></span>
                    <span class="medium">🟡 中价品: <strong>${levelCount['中价品'] || 0}</strong></span>
                    <span class="low">🔵 低价品: <strong>${levelCount['低价品'] || 0}</strong></span>
                </div>
                <div style="margin-top:6px; font-size:12px; color:#666;">
                    💡 筛选栏已改为 <strong>"价格档位"</strong>，包含 高价品/中价品/低价品 三个选项
                </div>
            `;
            
            console.log('价格档位分布:', levelCount);

            if (groupedProducts.length === 0) {
                document.getElementById('countDisplay').innerText = '⚠️ 无有效商品数据';
                return;
            }

            initFilters();
            applyFilters();

        } catch (e) {
            console.error('加载失败:', e);
            debugBox.innerHTML = `
                <div style="color:red; font-weight:700;">❌ 数据加载失败</div>
                <div style="font-size:12px; color:#666;">${e.message}</div>
                <div style="font-size:12px; color:#666; margin-top:6px;">
                    请确保 <strong>data - new.csv</strong> 文件在相同目录下
                </div>
            `;
            document.getElementById('countDisplay').innerText = '❌ 加载失败';
        }
    }

    function checkLink(rawUrl) {
        if (!rawUrl) { alert('❌ 无核价链接'); return; }
        const match = rawUrl.match(/https?:\/\/[^\s]+/);
        if (match) window.open(match[0], '_blank');
        else alert('❌ 无法识别的链接');
    }

    function getPriceLevelClass(level) {
        if (level === '高价品') return 'bg-high';
        if (level === '中价品') return 'bg-medium';
        if (level === '低价品') return 'bg-low';
        return 'bg-medium';
    }

    function render(groupList, page = 1) {
        if (!groupList || groupList.length === 0) {
            document.getElementById('productGrid').innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px;">暂无匹配的商品</div>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        
        currentPage = page;
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        const start = (page - 1) * pageSize;
        const end = start + pageSize;
        const pageItems = groupList.slice(start, end);

        pageItems.forEach(g => {
            const level = g.priceLevel || '中价品';
            const judgeClass = getPriceLevelClass(level);
            const judgeDisplay = level;
            const priceRangeText = g.minPrice === g.maxPrice ? `¥${g.minPrice.toFixed(2)}` : `¥${g.minPrice.toFixed(2)} - ¥${g.maxPrice.toFixed(2)}`;
            const inviteId = g.inviteId || '';

            let variantsHtml = g.variants.slice(0, 10).map(v => 
                `<div class="variant-item"><span class="variant-name" title="${v.variant.replace(/"/g, '&quot;')}">${v.variant}</span><span class="variant-price">¥${v.price.toFixed(2)}</span></div>`
            ).join('');
            if (g.variants.length > 10) variantsHtml += `<div class="variant-item" style="justify-content:center;">等${g.variants.length}个规格</div>`;

            let imagesHtml = g.variants.map(v => `
                <div class="model-img-item">
                    <img src="${v.imgUrl || g.imgUrl}" ondblclick="document.getElementById('modalImg').src='${v.imgUrl || g.imgUrl}'; document.getElementById('imageModal').style.display='flex';">
                    <div class="model-price">¥${v.price.toFixed(2)}</div>
                    <div class="model-variant" title="${v.variant.replace(/"/g, '&quot;')}">${v.variant.substring(0,8)}…</div>
                </div>
            `).join('');

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="judge-tag ${judgeClass}" onclick="checkLink('${(g.link1688 || '').replace(/'/g, "\\'")}')">${judgeDisplay}</div>
                <div class="img-container" ondblclick="document.getElementById('modalImg').src='${g.imgUrl}'; document.getElementById('imageModal').style.display='flex';">
                    <img src="${g.imgUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'">
                </div>
                <div class="info">
                    <div class="title" title="${g.title.replace(/"/g, '&quot;')}">${g.title}</div>
                    <div class="price-range">${priceRangeText} <small>起</small></div>
                    <div class="variants-box">${variantsHtml}</div>
                    <button class="expand-btn" onclick="this.nextElementSibling.classList.toggle('show'); this.textContent = this.nextElementSibling.classList.contains('show')?'收起图片':'展开图片'">展开图片</button>
                    <div class="model-images">${imagesHtml}</div>
                    <div class="invite-row">
                        <span class="model-count-tag">${g.modelCount}款</span>
                        <div class="invite-id-box" onclick="navigator.clipboard.writeText('${inviteId.replace(/'/g, "\\'")}').then(()=>alert('✅ 已复制: ${inviteId}')).catch(()=>alert('复制失败'))">${inviteId || '--'}</div>
                    </div>
                    <div class="footer-row">
                        <span>${g.date || ''}</span>
                        <span style="font-weight:600;">${g.itemid}</span>
                        <div>
                            <a href="javascript:void(0)" onclick="checkLink('${(g.link1688 || '').replace(/'/g, "\\'")}')">1688</a>
                            <a href="${g.link}" target="_blank" rel="noopener">原品</a>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        renderPagination(groupList.length);
    }

    function renderPagination(total) {
        const totalPages = Math.ceil(total / pageSize) || 1;
        const p = document.getElementById('pagination');
        p.innerHTML = `
            <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>◀ 上一页</button>
            <span style="margin:0 12px;">${currentPage} / ${totalPages}</span>
            <button onclick="changePage(1)" ${currentPage >= totalPages ? 'disabled' : ''}>下一页 ▶</button>
            <input type="number" id="jumpPage" min="1" max="${totalPages}" style="width:70px;" placeholder="页码">
            <button onclick="jumpToPage()">跳转</button>
        `;
    }

    window.changePage = (delta) => { render(filteredGroup, currentPage + delta); };
    window.jumpToPage = () => {
        const p = parseInt(document.getElementById('jumpPage').value);
        const max = Math.ceil(filteredGroup.length / pageSize);
        if (p > 0 && p <= max) render(filteredGroup, p);
    };

    function applyFilters() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        const l1 = document.getElementById('l1Filter').value;
        const l2 = document.getElementById('l2Filter').value;
        const l3 = document.getElementById('l3Filter').value;
        const priceLevel = document.getElementById('priceLevelFilter').value;
        const selectedDate = document.getElementById('dateFilter').value;
        const min = parseFloat(document.getElementById('minPrice').value) || 0;
        const max = parseFloat(document.getElementById('maxPrice').value) || Infinity;

        filteredGroup = groupedProducts.filter(g => {
            if (q && !g.title.toLowerCase().includes(q) && !g.inviteId.toLowerCase().includes(q)) return false;
            if (l1 && g.l1 !== l1) return false;
            if (l2 && g.l2 !== l2) return false;
            if (l3 && g.l3 !== l3) return false;
            if (priceLevel && g.priceLevel !== priceLevel) return false;
            if (selectedDate && g.date !== selectedDate) return false;
            if (g.maxPrice < min || g.minPrice > max) return false;
            return true;
        });

        const sort = document.getElementById('sortOrder').value;
        if (sort === 'priceAsc') {
            filteredGroup.sort((a, b) => a.minPrice - b.minPrice);
        } else if (sort === 'priceDesc') {
            filteredGroup.sort((a, b) => b.maxPrice - a.maxPrice);
        } else {
            filteredGroup.sort((a, b) => (a.itemid || '').localeCompare(b.itemid || ''));
        }

        document.getElementById('countDisplay').innerText = `📦 共 ${filteredGroup.length} 个商品`;
        render(filteredGroup, 1);
    }

    function initFilters() {
        const l1Set = new Set();
        const dateSet = new Set();
        groupedProducts.forEach(g => {
            if (g.l1) l1Set.add(g.l1);
            if (g.date) dateSet.add(g.date);
        });
        const l1Select = document.getElementById('l1Filter');
        l1Select.innerHTML = '<option value="">一级类目(全部)</option>';
        [...l1Set].sort().forEach(v => {
            const opt = document.createElement('option');
            opt.value = v; opt.textContent = v;
            l1Select.appendChild(opt);
        });

        const dateSelect = document.getElementById('dateFilter');
        dateSelect.innerHTML = '<option value="">发布日期(全部)</option>';
        [...dateSet].sort().forEach(v => {
            const opt = document.createElement('option');
            opt.value = v; opt.textContent = v;
            dateSelect.appendChild(opt);
        });

        updateL2();
    }

    function updateL2() {
        const l1 = document.getElementById('l1Filter').value;
        const l2Set = new Set();
        groupedProducts.forEach(g => {
            if (!l1 || g.l1 === l1) {
                if (g.l2) l2Set.add(g.l2);
            }
        });
        const l2Select = document.getElementById('l2Filter');
        l2Select.innerHTML = '<option value="">二级类目(全部)</option>';
        [...l2Set].sort().forEach(v => {
            const opt = document.createElement('option');
            opt.value = v; opt.textContent = v;
            l2Select.appendChild(opt);
        });
        updateL3();
    }

    function updateL3() {
        const l1 = document.getElementById('l1Filter').value;
        const l2 = document.getElementById('l2Filter').value;
        const l3Set = new Set();
        groupedProducts.forEach(g => {
            if ((!l1 || g.l1 === l1) && (!l2 || g.l2 === l2)) {
                const l3Val = (g.l3 && typeof g.l3 === 'string') ? g.l3.trim() : '';
                if (l3Val) l3Set.add(l3Val);
            }
        });
        const l3Select = document.getElementById('l3Filter');
        l3Select.innerHTML = '<option value="">三级类目(全部)</option>';
        [...l3Set].sort((a,b) => a.localeCompare(b)).forEach(v => {
            const opt = document.createElement('option');
            opt.value = v; opt.textContent = v;
            l3Select.appendChild(opt);
        });
    }

    let timer;
    window.debouncedFilter = () => {
        clearTimeout(timer);
        timer = setTimeout(applyFilters, 300);
    };
    window.checkLink = checkLink;

    window.onload = loadData;
</script>
