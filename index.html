<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>6月热销 · 男女袜寻品清单</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f4f4f7;
            color: #333;
            padding: 20px;
        }
        .container { max-width: 1440px; margin: 0 auto; }
        header {
            background: #ee4d2d;
            color: white;
            padding: 20px 24px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        header h1 { font-size: 22px; }
        .desc-box {
            background: rgba(255,255,255,0.15);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 8px;
            line-height: 1.6;
        }
        .filter-section {
            background: white;
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border: 1px solid #eee;
        }
        .filter-section input, .filter-section select {
            padding: 8px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 13px;
            background: #fafafa;
            min-width: 120px;
        }
        .filter-section input:focus, .filter-section select:focus {
            outline: none;
            border-color: #ee4d2d;
        }
        .filter-section .search-box { min-width: 160px; flex: 1; }
        #countDisplay {
            background: #fff0ed;
            padding: 4px 16px;
            border-radius: 30px;
            font-weight: 600;
            color: #ee4d2d;
            font-size: 14px;
            margin-left: auto;
            white-space: nowrap;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #eee;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: transform 0.15s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.08); }
        .judge-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            z-index: 5;
            color: white;
        }
        .judge-tag.high { background: #e67e22; }
        .judge-tag.mid { background: #2b7a4b; }
        .judge-tag.low { background: #1a5c7e; }
        .img-container {
            width: 100%;
            height: 180px;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-in;
            border-bottom: 1px solid #f0f0f0;
        }
        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .info { padding: 14px 16px; flex: 1; }
        .title {
            font-weight: 600;
            font-size: 14px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            overflow: hidden;
            min-height: 40px;
        }
        .price-range {
            color: #ee4d2d;
            font-size: 18px;
            font-weight: 700;
            margin: 6px 0 10px;
        }
        .price-range small { font-size: 12px; font-weight: 400; color: #999; }
        .variants-box {
            background: #f8f9fc;
            border-radius: 12px;
            padding: 8px 10px;
            max-height: 140px;
            overflow-y: auto;
            border: 1px solid #eee;
            font-size: 12px;
        }
        .variants-box::-webkit-scrollbar { width: 4px; }
        .variants-box::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
        .variant-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 4px;
            border-bottom: 1px dashed #eee;
            font-size: 12px;
        }
        .variant-item:last-child { border-bottom: none; }
        .variant-item .v-price { color: #ee4d2d; font-weight: 600; }
        .invite-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0 6px;
        }
        .model-count-tag {
            background: #fff1f0;
            border: 1px solid #ffbcb3;
            color: #c02b1a;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .invite-id-box {
            flex: 1;
            background: #fff8f6;
            border: 2px dashed #ee4d2d;
            padding: 5px 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            color: #ee4d2d;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.15s;
            font-family: monospace;
        }
        .invite-id-box:hover { background: #ee4d2d; color: white; border-style: solid; }
        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #999;
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
            margin-top: 6px;
        }
        .footer-row a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
            font-size: 11px;
            background: #f0f7ff;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 4px;
        }
        .footer-row a:hover { background: #0066cc; color: white; }
        .expand-btn {
            background: none;
            border: 1px dashed #ccc;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            cursor: pointer;
            color: #888;
            margin-top: 8px;
        }
        .expand-btn:hover { border-color: #ee4d2d; color: #ee4d2d; }
        .model-images {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .model-images.show { display: grid; }
        .model-img-item { text-align: center; }
        .model-img-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            cursor: zoom-in;
            border: 1px solid #eee;
        }
        .model-img-item .model-price { font-size: 10px; color: #ee4d2d; font-weight: 600; }
        #imageModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #imageModal img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
        #pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }
        #pagination button {
            background: white;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 13px;
        }
        #pagination button:hover:not(:disabled) { background: #ee4d2d; color: white; border-color: #ee4d2d; }
        #pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        #pagination .page-info { font-size: 13px; color: #666; }
        #pagination input[type="number"] {
            width: 60px;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 20px;
            text-align: center;
            font-size: 13px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a2e;
            color: white;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.4s;
            z-index: 999;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .filter-section { flex-direction: column; align-items: stretch; }
            .filter-section .search-box { min-width: auto; }
            #countDisplay { margin-left: 0; text-align: center; }
            header h1 { font-size: 18px; }
            .desc-box { font-size: 12px; }
            .img-container { height: 140px; }
            .title { font-size: 13px; }
            .price-range { font-size: 16px; }
        }
        @media (max-width: 480px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🔥 6月热销 · 男女袜寻品清单</h1>
        <div class="desc-box">
            💰 <strong>高效提报</strong>：单击红色虚线框复制邀请ID，一次报满该商品下所有规格。鼓励拓色拓码提报！<br>
            📌 提报路径：SCS卖家后台 → 商品管理 → 机会商品 → 输入邀请ID → 立刻报名<br>
            💹 价格问题：点击1688标签查看核价参考，联系买手申诉。
        </div>
    </header>

    <!-- ===== 筛选栏 ===== -->
    <div class="filter-section">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索标题 / ID..." oninput="debouncedFilter()">
        <select id="l1Filter" onchange="updateL2(); updateL3(); applyFilters()"><option value="">一级类目(全部)</option></select>
        <select id="l2Filter" onchange="updateL3(); applyFilters()"><option value="">二级类目(全部)</option></select>
        <select id="l3Filter" onchange="applyFilters()"><option value="">三级类目(全部)</option></select>
        
        <!-- ===== 价格定位筛选器（高价品/中价品/低价品） ===== -->
        <select id="priceJudgeFilter" onchange="applyFilters()">
            <option value="">💰 价格定位(全部)</option>
            <option value="高价品">🔥 高价品</option>
            <option value="中价品">💚 中价品</option>
            <option value="低价品">💙 低价品</option>
        </select>
        
        <select id="dateFilter" onchange="applyFilters()"><option value="">发布日期(全部)</option></select>
        <input type="number" id="minPrice" placeholder="¥ 最低价" step="0.01" oninput="debouncedFilter()">
        <input type="number" id="maxPrice" placeholder="¥ 最高价" step="0.01" oninput="debouncedFilter()">
        <select id="sortOrder" onchange="applyFilters()">
            <option value="default">📌 默认排序</option>
            <option value="priceAsc">💹 价格升序</option>
            <option value="priceDesc">💹 价格降序</option>
        </select>
        <span id="countDisplay">加载中...</span>
    </div>

    <div class="product-grid" id="productGrid"></div>
    <div id="pagination"></div>
</div>

<div id="imageModal" onclick="this.style.display='none'"><img id="modalImg" src=""></div>
<div class="toast" id="toast"></div>

<script>
    // ============================================================
    //  核心数据
    // ============================================================

    let products = [];
    let groupedProducts = [];
    let filteredGroup = [];
    let currentPage = 1;
    const pageSize = 40;

    // ============================================================
    //  工具函数
    // ============================================================

    const safeGet = (arr, idx, def = '') => (arr && arr.length > idx && arr[idx] != null) ? String(arr[idx]) : def;
    const cleanId = (str) => str ? str.toString().replace(/^['"+]+|["=\t]/g, '').trim() : '';

    const parseRow = (arr) => ({
        title: safeGet(arr, 0),
        variant: safeGet(arr, 1),
        price: parseFloat(safeGet(arr, 2)) || 0,
        imgUrl: safeGet(arr, 3),
        link: safeGet(arr, 4),
        l1: safeGet(arr, 5).trim(),
        l2: safeGet(arr, 6).trim(),
        l3: safeGet(arr, 16).trim(),
        inviteId: cleanId(safeGet(arr, 7)),
        modelId: cleanId(safeGet(arr, 8)),
        link1688: safeGet(arr, 9),
        judgeText: safeGet(arr, 10).trim(),
        date: safeGet(arr, 11).trim(),
        itemid: cleanId(safeGet(arr, 12)) || `temp_${Math.random()}`,
    });

    // ============================================================
    //  按 itemid 分组
    // ============================================================

    function groupByItemid(rows) {
        const map = new Map();
        rows.forEach(row => {
            const p = parseRow(row);
            const id = p.itemid;
            if (!map.has(id)) {
                map.set(id, {
                    itemid: id,
                    title: p.title,
                    imgUrl: p.imgUrl,
                    link: p.link,
                    l1: p.l1,
                    l2: p.l2,
                    l3: p.l3,
                    inviteId: p.inviteId,
                    link1688: p.link1688,
                    date: p.date,
                    priceJudge: p.judgeText || '中价品',
                    variants: []
                });
            }
            const g = map.get(id);
            if (!g.imgUrl && p.imgUrl) g.imgUrl = p.imgUrl;
            if (!g.link && p.link) g.link = p.link;
            if (!g.link1688 && p.link1688) g.link1688 = p.link1688;
            if (!g.l3 && p.l3) g.l3 = p.l3;
            if (p.judgeText && !g.priceJudge) g.priceJudge = p.judgeText;
            // 去重添加 variant
            const key = p.modelId || p.variant;
            if (!g.variants.some(v => (v.modelId || v.variant) === key)) {
                g.variants.push({
                    variant: p.variant || '默认',
                    price: p.price,
                    modelId: p.modelId,
                    imgUrl: p.imgUrl,
                });
            }
        });

        const result = [];
        for (let g of map.values()) {
            const prices = g.variants.map(v => v.price).filter(p => p > 0);
            g.minPrice = prices.length ? Math.min(...prices) : 0;
            g.maxPrice = prices.length ? Math.max(...prices) : 0;
            g.modelCount = g.variants.length;
            g.variants.sort((a, b) => a.price - b.price);
            
            // 价格定位
            const j = g.priceJudge || '';
            if (j.includes('高价品')) { g.judgeDisplay = '高价品'; g.judgeClass = 'high'; }
            else if (j.includes('低价品')) { g.judgeDisplay = '低价品'; g.judgeClass = 'low'; }
            else { g.judgeDisplay = '中价品'; g.judgeClass = 'mid'; }
            result.push(g);
        }
        return result;
    }

    // ============================================================
    //  加载 CSV
    // ============================================================

    async function loadData() {
        try {
            const res = await fetch('data-new.csv');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            const lines = text.split(/\r?\n/).filter(l => l.trim());

            const rawRows = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                if (line.replace(/,/g, '').trim() === '') continue;
                let row = [], cur = '', inQ = false;
                for (let c of line) {
                    if (c === '"') inQ = !inQ;
                    else if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
                    else cur += c;
                }
                row.push(cur.trim());
                if (!row[0] && !row[7]) continue;
                rawRows.push(row);
            }

            if (rawRows.length === 0) throw new Error('无有效数据');
            products = rawRows;
            groupedProducts = groupByItemid(products);
            console.log(`✅ 分组后 ${groupedProducts.length} 个商品`);

            initFilters();
            applyFilters();
        } catch (e) {
            document.getElementById('countDisplay').textContent = '❌ 加载失败';
            document.getElementById('productGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;">加载失败：${e.message}</div>`;
            console.error(e);
        }
    }

    // ============================================================
    //  筛选 & 渲染
    // ============================================================

    function applyFilters() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        const l1 = document.getElementById('l1Filter').value;
        const l2 = document.getElementById('l2Filter').value;
        const l3 = document.getElementById('l3Filter').value;
        const priceJudge = document.getElementById('priceJudgeFilter').value;
        const date = document.getElementById('dateFilter').value;
        const min = parseFloat(document.getElementById('minPrice').value) || 0;
        const max = parseFloat(document.getElementById('maxPrice').value) || Infinity;

        filteredGroup = groupedProducts.filter(g => {
            if (q && !g.title.toLowerCase().includes(q) && !g.inviteId.toLowerCase().includes(q)) return false;
            if (l1 && g.l1 !== l1) return false;
            if (l2 && g.l2 !== l2) return false;
            if (l3 && g.l3 !== l3) return false;
            if (priceJudge && g.judgeDisplay !== priceJudge) return false;
            if (date && g.date !== date) return false;
            if (g.maxPrice < min || g.minPrice > max) return false;
            return true;
        });

        const sort = document.getElementById('sortOrder').value;
        if (sort === 'priceAsc') filteredGroup.sort((a, b) => a.minPrice - b.minPrice);
        else if (sort === 'priceDesc') filteredGroup.sort((a, b) => b.maxPrice - a.maxPrice);

        document.getElementById('countDisplay').textContent = `📦 共 ${filteredGroup.length} 个商品`;
        renderPage(1);
    }

    function renderPage(page) {
        currentPage = page;
        const grid = document.getElementById('productGrid');
        const start = (page - 1) * pageSize;
        const end = Math.min(start + pageSize, filteredGroup.length);
        const pageItems = filteredGroup.slice(start, end);

        if (!pageItems.length) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;">暂无匹配的商品</div>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        grid.innerHTML = pageItems.map(g => {
            const priceText = g.minPrice === g.maxPrice ? `¥${g.minPrice.toFixed(2)}` : `¥${g.minPrice.toFixed(2)} - ¥${g.maxPrice.toFixed(2)}`;
            const emoji = g.judgeClass === 'high' ? '🔥' : g.judgeClass === 'low' ? '💙' : '💚';
            const label = `${emoji} ${g.judgeDisplay}`;

            let variantsHtml = g.variants.slice(0, 10).map(v =>
                `<div class="variant-item"><span>${v.variant}</span><span class="v-price">¥${v.price.toFixed(2)}</span></div>`
            ).join('');
            if (g.variants.length > 10) variantsHtml += `<div class="variant-item" style="justify-content:center;color:#999;">+${g.variants.length - 10} 个规格</div>`;

            let imagesHtml = g.variants.map(v =>
                `<div class="model-img-item">
                    <img src="${v.imgUrl || g.imgUrl}" onclick="showImage('${v.imgUrl || g.imgUrl}')" onerror="this.style.display='none'">
                    <div class="model-price">¥${v.price.toFixed(2)}</div>
                </div>`
            ).join('');

            return `
            <div class="card">
                <div class="judge-tag ${g.judgeClass}" onclick="checkLink('${(g.link1688 || '').replace(/'/g, "\\'")}')">${label}</div>
                <div class="img-container" onclick="showImage('${g.imgUrl}')">
                    <img src="${g.imgUrl}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23ccc%22 font-size=%2214%22 font-family=%22sans-serif%22%3E无图%3C/text%3E%3C/svg%3E'">
                </div>
                <div class="info">
                    <div class="title" title="${g.title.replace(/"/g, '&quot;')}">${g.title}</div>
                    <div class="price-range">${priceText} <small>起</small></div>
                    <div class="variants-box">${variantsHtml}</div>
                    <button class="expand-btn" onclick="this.nextElementSibling.classList.toggle('show'); this.textContent = this.nextElementSibling.classList.contains('show')?'收起图片':'📷 展开图片'">📷 展开图片</button>
                    <div class="model-images">${imagesHtml}</div>
                    <div class="invite-row">
                        <span class="model-count-tag">${g.modelCount}款</span>
                        <div class="invite-id-box" onclick="copyInvite('${g.inviteId || ''}')">${g.inviteId || '--'}</div>
                    </div>
                    <div class="footer-row">
                        <span>${g.date || ''}</span>
                        <span style="font-weight:600;font-size:11px;color:#bbb;">${g.itemid}</span>
                        <div>
                            <a href="javascript:void(0)" onclick="checkLink('${(g.link1688 || '').replace(/'/g, "\\'")}')">1688</a>
                            <a href="${g.link}" target="_blank">原品</a>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');

        // 分页
        const totalPages = Math.ceil(filteredGroup.length / pageSize) || 1;
        document.getElementById('pagination').innerHTML = `
            <button onclick="changePage(-1)" ${page <= 1 ? 'disabled' : ''}>◀ 上一页</button>
            <span class="page-info">${page} / ${totalPages}</span>
            <button onclick="changePage(1)" ${page >= totalPages ? 'disabled' : ''}>下一页 ▶</button>
            <input type="number" id="jumpInput" min="1" max="${totalPages}" placeholder="页码">
            <button onclick="jumpPage()">跳转</button>
        `;
    }

    // ============================================================
    //  辅助函数
    // ============================================================

    function changePage(delta) { renderPage(currentPage + delta); }
    function jumpPage() {
        const p = parseInt(document.getElementById('jumpInput').value);
        const total = Math.ceil(filteredGroup.length / pageSize);
        if (p >= 1 && p <= total) renderPage(p);
    }

    function copyInvite(text) {
        if (!text) { showToast('⚠️ 无邀请ID'); return; }
        navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制: ' + text)).catch(() => {
            // fallback
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            showToast('✅ 已复制: ' + text);
        });
    }

    function showImage(url) {
        if (!url) return;
        document.getElementById('modalImg').src = url;
        document.getElementById('imageModal').style.display = 'flex';
    }

    function checkLink(rawUrl) {
        if (!rawUrl) { showToast('❌ 无1688链接'); return; }
        const match = rawUrl.match(/https?:\/\/[^\s]+/);
        if (match) window.open(match[0], '_blank');
        else showToast('❌ 无法识别的链接');
    }

    let toastTimer;

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ============================================================
    //  筛选器初始化
    // ============================================================

    function initFilters() {
        const l1Set = new Set(),
            dateSet = new Set();
        groupedProducts.forEach(g => {
            if (g.l1) l1Set.add(g.l1);
            if (g.date) dateSet.add(g.date);
        });
        const l1Sel = document.getElementById('l1Filter');
        l1Sel.innerHTML = '<option value="">一级类目(全部)</option>' + [...l1Set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        const dSel = document.getElementById('dateFilter');
        dSel.innerHTML = '<option value="">发布日期(全部)</option>' + [...dateSet].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        updateL2();
    }

    function updateL2() {
        const l1 = document.getElementById('l1Filter').value;
        const l2Set = new Set();
        groupedProducts.forEach(g => { if (!l1 || g.l1 === l1) { if (g.l2) l2Set.add(g.l2); } });
        const l2Sel = document.getElementById('l2Filter');
        l2Sel.innerHTML = '<option value="">二级类目(全部)</option>' + [...l2Set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        updateL3();
    }

    function updateL3() {
        const l1 = document.getElementById('l1Filter').value;
        const l2 = document.getElementById('l2Filter').value;
        const l3Set = new Set();
        groupedProducts.forEach(g => {
            if ((!l1 || g.l1 === l1) && (!l2 || g.l2 === l2)) {
                if (g.l3) l3Set.add(g.l3);
            }
        });
        const l3Sel = document.getElementById('l3Filter');
        l3Sel.innerHTML = '<option value="">三级类目(全部)</option>' + [...l3Set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
    }

    let timer;

    function debouncedFilter() {
        clearTimeout(timer);
        timer = setTimeout(applyFilters, 300);
    }

    // ============================================================
    //  启动
    // ============================================================

    window.onload = loadData;
</script>
</body>
</html>
